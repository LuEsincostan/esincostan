<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" shape-rendering="geometricPrecision">

  <!-- ─ Backgrounds (chess: TL=dark, TR=light, BL=light, BR=dark) ── -->
  <rect x="0"   y="0"   width="200" height="200" fill="#111010"/>
  <rect x="200" y="0"   width="200" height="200" fill="#f4f2ee"/>
  <rect x="0"   y="200" width="200" height="200" fill="#f4f2ee"/>
  <rect x="200" y="200" width="200" height="200" fill="#111010"/>

  <!-- ─ Quadrant dividers ────────────────────────────────────────── -->
  <line x1="200" y1="0"   x2="200" y2="400" stroke="#5a5550" stroke-width="1"/>
  <line x1="0"   y1="200" x2="400" y2="200" stroke="#5a5550" stroke-width="1"/>

  <!-- ─ Curves (33 pts each, edge-to-edge) ─────────────────────── -->

  <!--
    e^x over [-2.5, 1.5] — 33 pts, step 0.125
    x_s = i * 6.25
    y_s = 195 − (e^x / 4.5) * 190
  -->
  <polyline
    points="0,192 6,191 13,191 19,190 25,189 31,189 38,188 44,187 50,186 56,184 63,183 69,181 75,180 81,177 88,175 94,172 100,169 106,166 113,162 119,158 125,153 131,147 138,141 144,134 150,125 156,116 163,106 169,94 175,80 181,65 188,48 194,28 200,6"
    fill="none" stroke="#ece8e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!--
    sin(x) over [-π, π] — 33 pts, step π/16  (TR: x offset +200)
    x_s = 200 + i * 6.25
    y_s = 100 − sin(x) * 90
  -->
  <polyline
    points="200,100 206,118 213,134 219,150 225,164 231,175 238,183 244,188 250,190 256,188 263,183 269,175 275,164 281,150 288,134 294,118 300,100 306,82 313,66 319,50 325,36 331,25 338,17 344,12 350,10 356,12 363,17 369,25 375,36 381,50 388,66 394,82 400,100"
    fill="none" stroke="#1a1918" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!--
    cos(x) over [-π, π] — 33 pts, step π/16  (BL: y offset +200)
    x_s = i * 6.25
    y_s = 300 − cos(x) * 90
  -->
  <polyline
    points="0,390 6,388 13,383 19,375 25,364 31,350 38,334 44,318 50,300 56,282 63,266 69,250 75,236 81,225 88,217 94,212 100,210 106,212 113,217 119,225 125,236 131,250 138,266 144,282 150,300 156,318 163,334 169,350 175,364 181,375 188,383 194,388 200,390"
    fill="none" stroke="#1a1918" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!--
    tan(x) over [-1.25, 1.25] — 33 pts, step ~0.078  (BR: x offset +200, y centered at 300)
    x_s = 200 + i * 6.25
    y_s = 300 − tan(x) * 30
  -->
  <polyline
    points="200,390 206,368 213,355 219,346 225,339 231,333 238,329 244,325 250,321 256,318 263,315 269,312 275,310 281,307 288,305 294,302 300,300 306,298 313,295 319,293 325,290 331,288 338,285 344,282 350,279 356,275 363,271 369,267 375,261 381,254 388,245 394,232 400,210"
    fill="none" stroke="#ece8e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ─ Outer border ─────────────────────────────────────────────── -->
  <rect x="0.5" y="0.5" width="399" height="399" fill="none" stroke="#5a5550" stroke-width="1"/>

</svg>
